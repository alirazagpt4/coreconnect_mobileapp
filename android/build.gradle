buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.22"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
    // Versions lazmi add karein
    classpath("com.android.tools.build:gradle:8.1.1") 
    // Yahan version variable use karne ki jagah direct react-native-gradle-plugin likhein
    classpath("com.facebook.react:react-native-gradle-plugin") 
    classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22")
    
}
}

// Buildscript ke bahar hona chahiye ye block
allprojects {
    configurations.all {
        resolutionStrategy {
            force 'androidx.core:core:1.13.1'
            force 'androidx.core:core-ktx:1.13.1'
            force 'androidx.transition:transition:1.5.0'
            force 'androidx.transition:transition-ktx:1.5.0'
        }
    }
}

apply plugin: "com.facebook.react.rootproject"